<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 124" role="img" aria-label="Legend">
  <defs>
    <linearGradient id="dragonBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7a8cff"/>
      <stop offset="1" stop-color="#3344aa"/>
    </linearGradient>
    <linearGradient id="dragonWing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8ea2ff"/>
      <stop offset="1" stop-color="#5c6fd6"/>
    </linearGradient>
  </defs>

  <g stroke="#1a1f4a" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
    <!-- wings (back) -->
    <path d="M48 36
             C30 22 18 22 10 30
             C18 32 22 40 24 50
             C26 42 34 38 48 44 Z" fill="url(#dragonWing)"/>
    <path d="M82 36
             C100 22 112 22 120 30
             C112 32 108 40 106 50
             C104 42 96 38 82 44 Z" fill="url(#dragonWing)"/>

    <!-- body -->
    <path d="M40 56
             C40 42 56 32 65 32
             C74 32 90 42 90 56
             C90 70 80 80 72 84
             L78 92 L66 88 L60 92 L60 84
             C50 80 40 70 40 56 Z" fill="url(#dragonBody)"/>

    <!-- head -->
    <path d="M44 50
             C40 38 52 28 64 32
             C76 28 88 38 84 50
             C90 52 88 60 80 58
             C82 64 76 68 70 64
             C68 70 60 70 58 64
             C52 68 46 64 48 58
             C40 60 38 52 44 50 Z" fill="url(#dragonBody)"/>

    <!-- eyes -->
    <circle cx="56" cy="48" r="3" fill="#fff"/>
    <circle cx="56" cy="48" r="1.5" fill="#1a1a1a" stroke="none"/>
    <circle cx="72" cy="48" r="3" fill="#fff"/>
    <circle cx="72" cy="48" r="1.5" fill="#1a1a1a" stroke="none"/>

    <!-- horns -->
    <path d="M50 32 L46 22 M78 32 L82 22" fill="none"/>
  </g>

  <text x="65" y="110" text-anchor="middle"
        font-family="'Comic Sans MS', 'Trebuchet MS', sans-serif"
        font-size="18" font-weight="900" font-style="italic"
        fill="#cc2222" stroke="#fff" stroke-width="3"
        paint-order="stroke">Legend</text>
</svg>
