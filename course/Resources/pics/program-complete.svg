<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 84 88" role="img" aria-label="Complete program">
  <defs>
    <linearGradient id="pgPage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e6efff"/>
    </linearGradient>
    <linearGradient id="pgPageBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c9d6ea"/>
      <stop offset="1" stop-color="#9fb2cc"/>
    </linearGradient>
  </defs>

  <g stroke="#1a1a1a" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round">
    <!-- back page -->
    <path d="M22 8 H56 L66 18 V72 H22 Z" fill="url(#pgPageBack)"/>
    <!-- front page -->
    <path d="M14 14 H48 L58 24 V78 H14 Z" fill="url(#pgPage)"/>
    <!-- folded corner -->
    <path d="M48 14 V24 H58" fill="#b4c5e0"/>

    <!-- code lines -->
    <g stroke="#1a1f4a" stroke-width="1.2">
      <line x1="20" y1="32" x2="50" y2="32"/>
      <line x1="20" y1="38" x2="44" y2="38"/>
      <line x1="22" y1="44" x2="50" y2="44"/>
      <line x1="22" y1="50" x2="48" y2="50"/>
      <line x1="20" y1="56" x2="46" y2="56"/>
      <line x1="20" y1="62" x2="52" y2="62"/>
      <line x1="22" y1="68" x2="42" y2="68"/>
      <line x1="22" y1="74" x2="48" y2="74"/>
    </g>
  </g>

  <text x="42" y="86" text-anchor="middle"
        font-family="'Comic Sans MS', 'Trebuchet MS', sans-serif"
        font-size="9" font-weight="700"
        fill="#0033cc">Program</text>
</svg>
