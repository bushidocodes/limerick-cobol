<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 138" role="img" aria-label="Self-Assessment Question">
  <defs>
    <linearGradient id="saqPage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dde6f5"/>
    </linearGradient>
  </defs>

  <!-- folded page -->
  <path d="M14 4 H66 L86 24 V112 H14 Z"
        fill="url(#saqPage)" stroke="#1a1a1a" stroke-width="2" stroke-linejoin="round"/>
  <path d="M66 4 V24 H86" fill="#c9d4ea" stroke="#1a1a1a" stroke-width="2" stroke-linejoin="round"/>

  <!-- text lines -->
  <g stroke="#1a1a1a" stroke-width="2" stroke-linecap="round">
    <line x1="22" y1="40" x2="78" y2="40"/>
    <line x1="22" y1="52" x2="72" y2="52"/>
    <line x1="22" y1="64" x2="78" y2="64"/>
    <line x1="22" y1="76" x2="66" y2="76"/>
    <line x1="22" y1="88" x2="78" y2="88"/>
    <line x1="22" y1="100" x2="60" y2="100"/>
  </g>

  <!-- big question mark over page -->
  <g transform="translate(58 70)">
    <text x="0" y="0" text-anchor="middle"
          font-family="'Trebuchet MS', Helvetica, sans-serif"
          font-size="68" font-weight="900"
          fill="#cc2222" stroke="#1a1a1a" stroke-width="2"
          paint-order="stroke">?</text>
  </g>

  <text x="48" y="132" text-anchor="middle"
        font-family="'Comic Sans MS', 'Trebuchet MS', sans-serif"
        font-size="16" font-weight="700"
        fill="#0033cc">SAQ</text>
</svg>
