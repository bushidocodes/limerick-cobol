<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 124 138" role="img" aria-label="Animation">
  <defs>
    <linearGradient id="reel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a5a5a"/>
      <stop offset="1" stop-color="#2a2a2a"/>
    </linearGradient>
  </defs>

  <!-- back reel -->
  <g transform="translate(76 30)">
    <circle r="26" fill="url(#reel)" stroke="#111" stroke-width="2"/>
    <circle r="6" fill="#aaa" stroke="#111" stroke-width="2"/>
    <g stroke="#111" stroke-width="2" fill="#777">
      <circle cx="0" cy="-16" r="3"/>
      <circle cx="14" cy="-8" r="3"/>
      <circle cx="14" cy="8" r="3"/>
      <circle cx="0" cy="16" r="3"/>
      <circle cx="-14" cy="8" r="3"/>
      <circle cx="-14" cy="-8" r="3"/>
    </g>
  </g>

  <!-- front reel -->
  <g transform="translate(40 50)">
    <circle r="34" fill="url(#reel)" stroke="#111" stroke-width="2"/>
    <circle r="8" fill="#aaa" stroke="#111" stroke-width="2"/>
    <g stroke="#111" stroke-width="2" fill="#777">
      <circle cx="0" cy="-22" r="4"/>
      <circle cx="19" cy="-11" r="4"/>
      <circle cx="19" cy="11" r="4"/>
      <circle cx="0" cy="22" r="4"/>
      <circle cx="-19" cy="11" r="4"/>
      <circle cx="-19" cy="-11" r="4"/>
    </g>
  </g>

  <!-- film strip hanging -->
  <g transform="translate(6 96)">
    <rect x="0" y="0" width="112" height="22" fill="#1a1a1a" stroke="#111" stroke-width="1"/>
    <g fill="#fff">
      <rect x="4" y="3" width="6" height="4"/>
      <rect x="4" y="15" width="6" height="4"/>
      <rect x="22" y="3" width="6" height="4"/>
      <rect x="22" y="15" width="6" height="4"/>
      <rect x="40" y="3" width="6" height="4"/>
      <rect x="40" y="15" width="6" height="4"/>
      <rect x="58" y="3" width="6" height="4"/>
      <rect x="58" y="15" width="6" height="4"/>
      <rect x="76" y="3" width="6" height="4"/>
      <rect x="76" y="15" width="6" height="4"/>
      <rect x="94" y="3" width="6" height="4"/>
      <rect x="94" y="15" width="6" height="4"/>
    </g>
    <g fill="#cc4422">
      <rect x="14" y="8" width="14" height="6"/>
      <rect x="32" y="8" width="14" height="6"/>
      <rect x="50" y="8" width="14" height="6"/>
      <rect x="68" y="8" width="14" height="6"/>
      <rect x="86" y="8" width="14" height="6"/>
    </g>
  </g>

  <text x="62" y="134" text-anchor="middle"
        font-family="'Comic Sans MS', 'Trebuchet MS', sans-serif"
        font-size="12" font-weight="700"
        fill="#0033cc">Animation</text>
</svg>
