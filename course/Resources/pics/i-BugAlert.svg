<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 112 124" role="img" aria-label="Bug Alert">
  <!-- yellow warning triangle -->
  <path d="M56 6 L106 96 H6 Z"
        fill="#ffd83a" stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round"/>
  <path d="M56 16 L96 90 H16 Z"
        fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linejoin="round"/>

  <!-- bug body -->
  <g stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" fill="#c0322a">
    <!-- legs -->
    <path d="M42 56 L32 50 M42 62 L30 62 M42 68 L32 74"/>
    <path d="M70 56 L80 50 M70 62 L82 62 M70 68 L80 74"/>
    <!-- antennae -->
    <path d="M50 44 L46 36 M62 44 L66 36" fill="none"/>
    <!-- head -->
    <circle cx="56" cy="46" r="6" fill="#1a1a1a"/>
    <!-- body -->
    <ellipse cx="56" cy="64" rx="14" ry="18"/>
    <!-- stripe / wing line -->
    <path d="M56 50 V80" stroke="#1a1a1a" fill="none"/>
    <circle cx="50" cy="60" r="2" fill="#1a1a1a"/>
    <circle cx="62" cy="60" r="2" fill="#1a1a1a"/>
    <circle cx="50" cy="70" r="2" fill="#1a1a1a"/>
    <circle cx="62" cy="70" r="2" fill="#1a1a1a"/>
  </g>

  <text x="56" y="116" text-anchor="middle"
        font-family="'Comic Sans MS', 'Trebuchet MS', sans-serif"
        font-size="12" font-weight="700"
        fill="#0033cc">Bug Alert</text>
</svg>
