<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 84 88" role="img" aria-label="Tip">
  <defs>
    <radialGradient id="lbtBulb" cx=".4" cy=".35" r=".75">
      <stop offset="0" stop-color="#fffbcc"/>
      <stop offset=".6" stop-color="#ffe14a"/>
      <stop offset="1" stop-color="#e8a800"/>
    </radialGradient>
    <linearGradient id="lbtBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bcbcbc"/>
      <stop offset="1" stop-color="#7a7a7a"/>
    </linearGradient>
  </defs>

  <g stroke="#3a2a00" stroke-linejoin="round" stroke-linecap="round">
    <!-- glow rays -->
    <g stroke="#f6c200" stroke-width="2" fill="none" opacity=".85">
      <path d="M42 5 V14"/>
      <path d="M14 22 L21 28"/>
      <path d="M70 22 L63 28"/>
      <path d="M6 46 H15"/>
      <path d="M78 46 H69"/>
    </g>

    <!-- bulb -->
    <path d="M42 12
             c-13 0 -22 9 -22 21
             c0 8 4 13 8 17
             c3 3 4 6 4 9
             v3
             h20
             v-3
             c0 -3 1 -6 4 -9
             c4 -4 8 -9 8 -17
             c0 -12 -9 -21 -22 -21 Z"
          fill="url(#lbtBulb)" stroke-width="1.6"/>

    <!-- filament -->
    <path d="M34 38 C38 30 46 30 50 38 M34 42 C38 50 46 50 50 42" fill="none" stroke="#8a5b00" stroke-width="1.2"/>

    <!-- screw base -->
    <rect x="30" y="62" width="24" height="6" fill="url(#lbtBase)" stroke-width="1.2"/>
    <rect x="30" y="68" width="24" height="6" fill="url(#lbtBase)" stroke-width="1.2"/>
    <rect x="32" y="74" width="20" height="4" fill="#5a5a5a" stroke-width="1.2"/>
    <path d="M36 78 v3 h12 v-3" fill="#3d3d3d" stroke-width="1.2"/>
  </g>

  <text x="42" y="55" text-anchor="middle"
        font-family="'Comic Sans MS', 'Trebuchet MS', sans-serif"
        font-size="14" font-weight="700"
        fill="#993300">Tip</text>
</svg>
