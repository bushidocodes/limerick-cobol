name: checks

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  checks:
    name: Validate, links, and accessibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run validate
      - run: npm run check:assets
      - run: npm run links
      - run: npm run a11y
