<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="Programmer at computer">
  <defs>
    <linearGradient id="atScreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfe6ff"/>
      <stop offset="1" stop-color="#7faedc"/>
    </linearGradient>
  </defs>

  <g stroke="#1a1a1a" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round">
    <!-- desk -->
    <rect x="6" y="60" width="68" height="4" fill="#a4754a"/>
    <!-- monitor -->
    <rect x="40" y="20" width="32" height="24" rx="2" fill="#3a3a3a"/>
    <rect x="43" y="23" width="26" height="18" fill="url(#atScreen)"/>
    <path d="M50 30 H66 M50 34 H62 M50 38 H66" stroke="#1a1f4a" stroke-width="1"/>
    <!-- monitor stand -->
    <path d="M52 44 L52 50 L60 50 L60 44 M44 50 H68" fill="#5a5a5a"/>

    <!-- chair back -->
    <rect x="6" y="34" width="6" height="24" fill="#aa3a2a"/>
    <!-- person body -->
    <path d="M14 50
             C14 42 24 40 28 48
             L30 60 L18 60 Z" fill="#cc8855"/>
    <!-- arm reaching to keyboard -->
    <path d="M28 50 L42 56" stroke-width="3" stroke="#cc8855" fill="none"/>
    <!-- head -->
    <circle cx="22" cy="34" r="6" fill="#f0c8a0"/>
    <!-- hair -->
    <path d="M16 33 C16 27 28 27 28 33 L28 30 C26 28 18 28 16 30 Z" fill="#3a2a1a"/>

    <!-- keyboard -->
    <rect x="38" y="54" width="20" height="4" fill="#ddd" stroke-width="1.2"/>
  </g>
</svg>
